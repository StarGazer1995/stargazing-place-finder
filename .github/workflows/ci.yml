# GitHub Actions CI workflow
#
# Runs lint checks + full test suite on all pull requests targeting `main`.
# Uses `uv` for fast, reproducible dependency management.
# Lint/format config is defined in pyproject.toml under [tool.ruff].

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Check formatting (ruff format)
        run: uv run ruff format --check src/

      - name: Check linting (ruff check)
        run: uv run ruff check src/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true  # Pull Git LFS files (viirs_china_2025.tif)

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run test suite
        run: uv run python src/test/run_src_tests.py
        env:
          FAST_TESTS: "1"  # Skip slow geospatial network queries
