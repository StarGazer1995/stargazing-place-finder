# GitHub Actions CI workflow
#
# Runs lint checks + full test suite on all pull requests targeting `main`.
# Uses `uv` for fast, reproducible dependency management.
# Lint/format config is defined in pyproject.toml under [tool.ruff].

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format & Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Check formatting (ruff format)
        run: uv run ruff format --check src/

      - name: Check linting (ruff check)
        run: uv run ruff check src/

      - name: Static security scan (bandit)
        run: uv run bandit -r src/ -c pyproject.toml --severity-level medium

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download GeoTIFF data from Release asset
        run: |
          mkdir -p src/light_pollution/resources
          curl -fSL -o src/light_pollution/resources/viirs_china_2025.tif \
            "https://github.com/StarGazer1995/stargazing-place-finder/releases/download/geotiff-data-v1/viirs_china_2025.tif"
          ls -lh src/light_pollution/resources/viirs_china_2025.tif

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run test suite with coverage
        run: uv run pytest --cov=src --cov-report=xml --cov-report=term --no-header
        env:
          FAST_TESTS: "1"  # Skip slow geospatial network queries

      - name: Check new code coverage with diff-cover
        if: github.event_name == 'pull_request'
        run: |
          uv pip install diff-cover -q
          uv run diff-cover coverage.xml --compare-branch=origin/${{ github.base_ref }} --fail-under=100
          echo "✅ New/modified lines have 100% test coverage!"
