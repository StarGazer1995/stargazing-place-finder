# GitHub Actions CI workflow
#
# Runs lint checks + full test suite on all pull requests targeting `main`.
# Uses `uv` for fast, reproducible dependency management.
# Lint/format config is defined in pyproject.toml under [tool.ruff].

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend — typecheck + test + coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/source
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/source/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npm run typecheck

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Check new code coverage with diff-cover
        if: github.event_name == 'pull_request'
        run: |
          python3 -m pip install --break-system-packages diff-cover -q
          python3 -m diff_cover coverage/cobertura-coverage.xml \
            --compare-branch=origin/${{ github.base_ref }} \
            --fail-under=100
          echo "✅ Frontend new/modified lines have 100% test coverage!"

      - name: Build production bundle
        run: npm run build

  lint:
    name: Lint & Format & Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Check formatting (ruff format)
        run: uv run ruff format --check src/

      - name: Check linting (ruff check)
        run: uv run ruff check src/

      - name: Static security scan (bandit)
        run: uv run bandit -r src/ -c pyproject.toml --severity-level medium

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download GeoTIFF data from Release asset
        run: |
          mkdir -p src/light_pollution/resources
          curl -fSL -o src/light_pollution/resources/viirs_china_2025.tif \
            "https://github.com/StarGazer1995/stargazing-place-finder/releases/download/geotiff-data-v1/viirs_china_2025.tif"
          ls -lh src/light_pollution/resources/viirs_china_2025.tif

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run test suite with coverage
        run: uv run pytest --cov=src --cov-report=xml --cov-report=term --no-header

      - name: Check new code coverage with diff-cover
        if: github.event_name == 'pull_request'
        run: |
          uv pip install diff-cover -q
          uv run diff-cover coverage.xml --compare-branch=origin/${{ github.base_ref }} --fail-under=100
          echo "✅ New/modified lines have 100% test coverage!"

  smoke-test-package:
    name: "Smoke test — build + start server"
    runs-on: ubuntu-latest
    needs: [lint, test, frontend]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/source/package-lock.json

      - name: Build frontend (Vite)
        run: |
          cd src/source
          npm ci
          npm run build

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Download GeoTIFF data from Release asset
        run: |
          mkdir -p src/light_pollution/resources
          curl -fSL -o src/light_pollution/resources/viirs_china_2025.tif \
            "https://github.com/StarGazer1995/stargazing-place-finder/releases/download/geotiff-data-v1/viirs_china_2025.tif"
          ls -lh src/light_pollution/resources/viirs_china_2025.tif

      - name: Build wheel
        run: |
          uv sync --frozen --no-dev
          uv pip install build -q
          uv run python -m build --wheel --outdir dist

      - name: Install built wheel into a clean venv
        run: |
          WHEEL=$(ls dist/stargazing_place_finder-*.whl)
          echo "Installing $WHEEL into clean venv"
          python3.13 -m venv /tmp/spf-smoke
          /tmp/spf-smoke/bin/pip install "$WHEEL" uvicorn -q

      - name: Start server and verify health + web UI
        run: |
          /tmp/spf-smoke/bin/uvicorn server.main:app --host 127.0.0.1 --port 5001 2>/tmp/spf-server.log &
          SERVER_PID=$!

          # Wait for server to be ready (up to 15s)
          for i in $(seq 1 30); do
            if curl -s http://127.0.0.1:5001/api/health > /dev/null 2>&1; then
              echo "✅ Server responded in ${i}s"
              break
            fi
            sleep 0.5
          done

          # Verify health endpoint
          HEALTH=$(curl -s http://127.0.0.1:5001/api/health)
          echo "Health response: $HEALTH"
          echo "$HEALTH" | grep -q '"status":"healthy"' && echo "✅ Health: status = healthy"
          echo "$HEALTH" | grep -q '"analyzer_initialized":true' && echo "✅ Health: analyzer initialized"

          # Verify web UI returns the Stargazing Place Finder page (Vite-built frontend)
          HTML=$(curl -s http://127.0.0.1:5001/)
          echo "$HTML" | grep -q '观星地点查找器' && echo "✅ Web UI: Stargazing Place Finder page"
          echo "$HTML" | grep -q 'type="module"' && echo "✅ Web UI: Vite ES module entry"
          echo "$HTML" | grep -q 'leaflet' && echo "✅ Web UI: Leaflet map included"
          echo "$HTML" | grep -q '光污染' && echo "✅ Web UI: light pollution features present"

          # Verify bundled CSS is served (extract href from HTML <link>)
          CSS_HREF=$(echo "$HTML" | grep -o 'href="/assets/[^"]*\.css"' | head -1 | sed 's/href="//;s/"//')
          if [ -n "$CSS_HREF" ]; then
            CSS_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:5001$CSS_HREF")
            echo "$CSS_HREF → HTTP $CSS_STATUS"
            test "$CSS_STATUS" = "200" && echo "✅ Bundled CSS served"
          fi

          # Verify bundled JS is served (extract src from HTML <script>)
          JS_SRC=$(echo "$HTML" | grep -o 'src="/assets/[^"]*\.js"' | head -1 | sed 's/src="//;s/"//')
          if [ -n "$JS_SRC" ]; then
            JS_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:5001$JS_SRC")
            echo "$JS_SRC → HTTP $JS_STATUS"
            test "$JS_STATUS" = "200" && echo "✅ Bundled JS served"
          fi

          kill $SERVER_PID 2>/dev/null || true
          echo "✅ Smoke test complete — fully functional"
