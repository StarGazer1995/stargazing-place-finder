# Auto-request Copilot code review on every PR change.
#
# Triggers when a PR targeting `main` is opened or updated with new commits.
# Copilot will add a "Comment" review (does NOT count toward required approvals).

name: Copilot Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

permissions:
  pull-requests: write
  contents: read

jobs:
  request-review:
    name: Request Copilot Review
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Add Copilot as reviewer
        run: |
          gh api \
            "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/requested_reviewers" \
            --method POST \
            -F "team_reviewers[]=copilot" \
            --silent 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
