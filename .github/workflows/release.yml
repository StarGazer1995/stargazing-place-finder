# Release workflow: triggered by pushing a tag matching v*
#
#   git tag v0.4.0
#   git push origin v0.4.0
#
# Uses PyPI Trusted Publishing (OIDC) — no API token needed.
# Set up on PyPI: https://pypi.org/manage/project/stargazing-place-finder/settings/publishing/

name: Release to PyPI

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish:
    name: Build & Publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required for creating GitHub Releases
      id-token: write  # required for OIDC trusted publishing

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download GeoTIFF data from Release asset
        run: |
          mkdir -p src/light_pollution/resources
          curl -fSL -o src/light_pollution/resources/viirs_china_2025.tif \
            "https://github.com/StarGazer1995/stargazing-place-finder/releases/download/geotiff-data-v1/viirs_china_2025.tif"
          ls -lh src/light_pollution/resources/viirs_china_2025.tif

      - name: Verify tag matches pyproject.toml version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PYPROJ_VERSION=$(grep -E '^version\s*=' pyproject.toml | sed 's/.*"\(.*\)".*/\1/')
          if [ "$TAG_VERSION" != "$PYPROJ_VERSION" ]; then
            echo "❌ Tag version v${TAG_VERSION} does not match pyproject.toml version ${PYPROJ_VERSION}"
            exit 1
          fi
          echo "✅ Version ${TAG_VERSION} matches pyproject.toml"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Build package
        run: uv run python -m build

      - name: Check package quality
        run: uv run twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes
