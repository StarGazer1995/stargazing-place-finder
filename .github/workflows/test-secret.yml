name: Secret Test

on:
  push:
    tags:
      - 'test-*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test secret
        env:
          TEST_SECRET: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          echo "Secret length: ${#TEST_SECRET}"
          if [ -z "$TEST_SECRET" ]; then echo "EMPTY"; else echo "OK"; fi
