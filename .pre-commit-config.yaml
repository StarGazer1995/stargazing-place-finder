# Pre-commit hooks matching CI lint checks.
# CI: ruff format --check, ruff check, bandit (see .github/workflows/ci.yml)
#
# Uses `repo: local` hooks — runs `uv run ruff` / `uv run bandit` directly
# from the project environment. No separate tool environments to download.
#
# Install: pre-commit install
# Run all:  pre-commit run --all-files

repos:
  - repo: local
    hooks:
      - id: ruff-lint
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi, jupyter]
        files: ^src/

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi, jupyter]
        files: ^src/

      - id: bandit
        name: bandit security scan
        description: Run bandit on src/ (CI style)
        entry: uv run bandit -r src/ -c pyproject.toml --severity-level medium
        language: system
        pass_filenames: false
        stages: [pre-commit]
